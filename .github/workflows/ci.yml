name: CI

on:
  push:
    branches: [main]
  pull_request:

# Permissão mínima do token da CI.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build, testes, arquitetura, migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      # `verify` roda unitários (surefire), a verificação Spring Modulith e o
      # ApplicationContextIT (Testcontainers PostgreSQL 18: migrations + wiring).
      - name: mvnw verify
        run: ./mvnw -B --no-transfer-progress verify

  frontend:
    name: Frontend (build e testes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: lint (ESLint + fronteira de camadas)
        run: npm run lint
      - name: build
        run: npm run build
      - name: test (Vitest)
        run: npm test

  contracts:
    name: Contratos (schemas e OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validar JSON Schemas e OpenAPI
        run: |
          set -e
          python3 -m pip install --quiet pyyaml
          for f in contracts/*.json; do
            echo "JSON  $f"; python3 -m json.tool "$f" > /dev/null
          done
          for f in contracts/*.yaml; do
            echo "YAML  $f"; python3 -c "import sys,yaml; yaml.safe_load(open('$f'))"
          done
          echo "Contratos válidos."

  secrets:
    name: Verificação de segredos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --redact -v --exit-code=1

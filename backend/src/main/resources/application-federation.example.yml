# Ative somente em ambiente configurado. Segredos e chaves privadas não são versionados.
spring:
  config:
    activate:
      on-profile: federation
  security:
    saml2:
      relyingparty:
        registration:
          corporate:
            signing:
              credentials:
                - private-key-location: ${SAML_SP_PRIVATE_KEY_LOCATION}
                  certificate-location: ${SAML_SP_CERTIFICATE_LOCATION}
            assertingparty:
              metadata-uri: ${SAML_IDP_METADATA_URI}
    oauth2:
      client:
        registration:
          corporate-oidc:
            provider: corporate-oidc
            client-id: ${OIDC_CLIENT_ID}
            client-secret: ${OIDC_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
        provider:
          corporate-oidc:
            issuer-uri: ${OIDC_ISSUER_URI}

# SecurityFilterChain da implementação deve habilitar saml2Login/saml2Logout e oauth2Login
# somente quando o profile estiver ativo, usando success handler que converte a identidade
# externa em SecurityPrincipal interno. Não usar o principal federado diretamente no domínio.

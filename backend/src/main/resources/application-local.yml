# Perfil de desenvolvimento local. Credenciais aqui são descartáveis e batem
# com o compose.yaml; nunca use estes valores fora da máquina local.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/brassia}
    username: ${DB_USER:brassia_app}
    password: ${DB_PASSWORD:brassia85!@#}

server:
  # Porta padrão 8080. Se conflitar com outro app local, use SERVER_PORT=8081.
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        # Sobre HTTP local não é possível usar cookie __Host- (exige Secure).
        name: brassia_session
        secure: false

# Somente o ambiente local pode usar o adapter de arquivos em filesystem.
brassia:
  storage:
    provider: ${OBJECT_STORAGE_PROVIDER:filesystem}
    local-path: ${OBJECT_STORAGE_LOCAL_PATH:./data/objects}
  security:
    mfa:
      secret-key: ${MFA_SECRET_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
    # Admin de bootstrap para desenvolvimento local (credenciais descartáveis).
    # Resolve o ciclo inicial: dá um administrador logável que pode convidar os
    # demais. Nunca habilitar/usar estes valores fora da máquina local.
    bootstrap-admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@brassia.local}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:admin-local-123}
      name: ${BOOTSTRAP_ADMIN_NAME:Administrador Local}
  brewery:
    # Cervejaria default para o login já ter uma cervejaria ativa em dev.
    bootstrap:
      enabled: ${BOOTSTRAP_BREWERY_ENABLED:true}
      code: ${BOOTSTRAP_BREWERY_CODE:MATRIZ}
      name: ${BOOTSTRAP_BREWERY_NAME:Cervejaria Matriz}
      timezone: ${BOOTSTRAP_BREWERY_TIMEZONE:America/Sao_Paulo}

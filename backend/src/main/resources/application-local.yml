# Perfil de desenvolvimento local. Credenciais aqui são descartáveis e batem
# com o compose.yaml; nunca use estes valores fora da máquina local.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/brassia}
    username: ${DB_USER:brassia_app}
    password: ${DB_PASSWORD:brassia85!@#}

server:
  # Porta padrão 8080. Se conflitar com outro app local, use SERVER_PORT=8081.
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        # Sobre HTTP local não é possível usar cookie __Host- (exige Secure).
        name: brassia_session
        secure: false

# Somente o ambiente local pode usar o adapter de arquivos em filesystem.
brassia:
  storage:
    provider: ${OBJECT_STORAGE_PROVIDER:filesystem}
    local-path: ${OBJECT_STORAGE_LOCAL_PATH:./data/objects}

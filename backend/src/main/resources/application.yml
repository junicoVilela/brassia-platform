spring:
  application:
    name: brassia-api
  profiles:
    default: local
  mvc:
    problemdetails:
      enabled: true
  # Datasource é definido por perfil: application-local / application-prod; nos
  # testes vem do Testcontainers (@ServiceConnection). O base não fixa nenhum.
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  session:
    store-type: jdbc
    timeout: 30m
    jdbc:
      initialize-schema: never

server:
  servlet:
    session:
      cookie:
        name: ${SECURITY_SESSION_COOKIE:__Host-brew_session}
        http-only: true
        secure: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  pattern:
    # traceId visível em todo log; a trilha de auditoria usa o logger "AUDIT".
    level: "%5p [traceId=%X{traceId:-}]"

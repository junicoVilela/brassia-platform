services:
  postgres:
    image: postgres:18
    container_name: brassia-postgres
    environment:
      POSTGRES_DB: brassia
      POSTGRES_USER: brassia_app
      POSTGRES_PASSWORD: local-only-change-me
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brassia_app -d brassia"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:

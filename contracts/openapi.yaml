openapi: 3.1.0
info:
  title: BrassIA API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /recipes:
    get:
      operationId: listRecipes
      responses:
        '200': {description: OK}
    post:
      operationId: createRecipe
      responses:
        '201': {description: Created}
        '400': {$ref: '#/components/responses/Problem'}
  /recipes/{recipeId}/publish:
    post:
      operationId: publishRecipe
      parameters:
        - {name: recipeId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Published}
        '409': {$ref: '#/components/responses/Problem'}
  /breweries:
    get:
      operationId: listBreweries
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de cervejarias}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: registerBrewery
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterBrewery'}
      responses:
        '201': {description: Cervejaria cadastrada}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /breweries/active/preferences:
    get:
      operationId: getActiveBreweryPreferences
      responses:
        '200': {description: Preferências operacionais da cervejaria ativa}
        '403': {$ref: '#/components/responses/Problem'}
    put:
      operationId: updateActiveBreweryPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateBreweryPreferences'}
      responses:
        '200': {description: Preferências atualizadas (nova versão)}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /breweries/active/preferences/revisions/{version}:
    get:
      operationId: getBreweryPreferencesRevision
      parameters:
        - {name: version, in: path, required: true, schema: {type: integer, format: int64}}
      responses:
        '200': {description: Snapshot imutável de uma versão}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
  /catalog/ingredients:
    get:
      operationId: listIngredients
      parameters:
        - {name: type, in: query, schema: {type: string, enum: [MALT, HOP, YEAST, SALT, ADJUNCT, PACKAGING]}}
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de ingredientes}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: registerIngredient
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterIngredient'}
      responses:
        '201': {description: Ingrediente cadastrado}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /catalog/ingredients/{id}:
    put:
      operationId: updateIngredient
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateIngredient'}
      responses:
        '200': {description: Ingrediente atualizado (nova versão)}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /equipment:
    get:
      operationId: listEquipment
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de equipamentos}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: registerEquipment
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterEquipment'}
      responses:
        '201': {description: Equipamento cadastrado}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /equipment/{id}:
    put:
      operationId: updateEquipment
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateEquipment'}
      responses:
        '200': {description: Equipamento atualizado (nova versão)}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /equipment/{id}/revisions/{version}:
    get:
      operationId: getEquipmentRevision
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: version, in: path, required: true, schema: {type: integer, format: int64}}
      responses:
        '200': {description: Snapshot imutável de uma versão}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
  /equipment/{id}/maintenance:
    get:
      operationId: listEquipmentMaintenance
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Janelas de manutenção do equipamento}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: scheduleEquipmentMaintenance
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ScheduleMaintenance'}
      responses:
        '201': {description: Janela agendada}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /equipment/{id}/maintenance/{maintenanceId}/cancel:
    post:
      operationId: cancelEquipmentMaintenance
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: maintenanceId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204': {description: Janela cancelada}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /equipment/{id}/availability:
    get:
      operationId: getEquipmentAvailability
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: from, in: query, required: true, schema: {type: string, format: date-time}}
        - {name: to, in: query, required: true, schema: {type: string, format: date-time}}
      responses:
        '200': {description: Disponibilidade do equipamento no intervalo}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
  /water/sources:
    get:
      operationId: listWaterSources
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de fontes de água}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: registerWaterSource
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterWaterSource'}
      responses:
        '201': {description: Fonte cadastrada}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /water/sources/{id}:
    put:
      operationId: updateWaterSource
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateWaterSource'}
      responses:
        '200': {description: Fonte atualizada}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /water/sources/{sourceId}/reports:
    get:
      operationId: listWaterReports
      parameters:
        - {name: sourceId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Histórico de laudos (mais recente primeiro)}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: recordWaterReport
      parameters:
        - {name: sourceId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RecordWaterReport'}
      responses:
        '201': {description: Laudo registrado (imutável)}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
  /water/profiles:
    get:
      operationId: listWaterProfiles
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de perfis-alvo}
        '403': {$ref: '#/components/responses/Problem'}
    post:
      operationId: registerWaterProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RegisterWaterProfile'}
      responses:
        '201': {description: Perfil-alvo cadastrado}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /water/profiles/{id}:
    put:
      operationId: updateWaterProfile
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateWaterProfile'}
      responses:
        '200': {description: Perfil-alvo atualizado}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
        '409': {$ref: '#/components/responses/Problem'}
  /water/blends/simulate:
    post:
      operationId: simulateWaterBlend
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SimulateBlend'}
      responses:
        '200': {description: Resultado da mistura (balanço, entradas e método)}
        '400': {$ref: '#/components/responses/Problem'}
        '403': {$ref: '#/components/responses/Problem'}
  /brew-orders/{orderId}/start:
    post:
      operationId: startBrewOrder
      parameters:
        - {name: orderId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Started}
        '409': {$ref: '#/components/responses/Problem'}
  /batches/{batchId}/measurements:
    post:
      operationId: recordMeasurement
      parameters:
        - {name: batchId, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/Measurement'}
      responses:
        '201': {description: Recorded}
components:
  schemas:
    RegisterBrewery:
      type: object
      required: [code, name, timezone]
      properties:
        code: {type: string, maxLength: 40}
        name: {type: string, maxLength: 160}
        timezone: {type: string, maxLength: 80}
    UpdateBreweryPreferences:
      type: object
      required: [volumeUnit, massUnit, temperatureUnit, currencyCode, maxBatchVolume, stockPolicy, version]
      properties:
        volumeUnit: {type: string, enum: [L, ML]}
        massUnit: {type: string, enum: [KG, G]}
        temperatureUnit: {type: string, enum: [C, F]}
        currencyCode: {type: string, minLength: 3, maxLength: 3}
        maxBatchVolume: {type: number}
        allowNegativeStock: {type: boolean}
        stockPolicy: {type: string, enum: [FEFO, FIFO, NONE]}
        version: {type: integer, format: int64}
    RegisterIngredient:
      type: object
      required: [type, code, name, useUnit, purchaseUnit]
      properties:
        type: {type: string, enum: [MALT, HOP, YEAST, SALT, ADJUNCT, PACKAGING]}
        code: {type: string, maxLength: 40}
        name: {type: string, maxLength: 160}
        useUnit: {type: string, enum: [KG, G, MG, L, ML, UNIT, PACK]}
        purchaseUnit: {type: string, enum: [KG, G, MG, L, ML, UNIT, PACK]}
        attributes: {type: object, additionalProperties: {type: string}}
    UpdateIngredient:
      type: object
      required: [name, useUnit, purchaseUnit, version]
      properties:
        name: {type: string, maxLength: 160}
        useUnit: {type: string, enum: [KG, G, MG, L, ML, UNIT, PACK]}
        purchaseUnit: {type: string, enum: [KG, G, MG, L, ML, UNIT, PACK]}
        attributes: {type: object, additionalProperties: {type: string}}
        version: {type: integer, format: int64}
    RegisterEquipment:
      type: object
      required: [code, name, capacityLiters, deadSpaceLiters, mashEfficiencyPercent, boilOffLitersPerHour]
      properties:
        code: {type: string, maxLength: 40}
        name: {type: string, maxLength: 160}
        capacityLiters: {type: number}
        deadSpaceLiters: {type: number}
        mashEfficiencyPercent: {type: number}
        boilOffLitersPerHour: {type: number}
    UpdateEquipment:
      type: object
      required: [name, capacityLiters, deadSpaceLiters, mashEfficiencyPercent, boilOffLitersPerHour, version]
      properties:
        name: {type: string, maxLength: 160}
        capacityLiters: {type: number}
        deadSpaceLiters: {type: number}
        mashEfficiencyPercent: {type: number}
        boilOffLitersPerHour: {type: number}
        version: {type: integer, format: int64}
    ScheduleMaintenance:
      type: object
      required: [kind, startAt, endAt]
      properties:
        kind: {type: string, enum: [MAINTENANCE, CALIBRATION]}
        instrument: {type: string, maxLength: 160}
        startAt: {type: string, format: date-time}
        endAt: {type: string, format: date-time}
        notes: {type: string, maxLength: 500}
    RegisterWaterSource:
      type: object
      required: [code, name]
      properties:
        code: {type: string, maxLength: 40}
        name: {type: string, maxLength: 160}
    UpdateWaterSource:
      type: object
      required: [name, version]
      properties:
        name: {type: string, maxLength: 160}
        version: {type: integer, format: int64}
    RecordWaterReport:
      type: object
      required: [collectedOn, method, calcium, magnesium, sodium, sulfate, chloride, bicarbonate]
      properties:
        collectedOn: {type: string, format: date}
        method: {type: string, enum: [LAB, TEST_STRIP, ION_METER, UTILITY]}
        calcium: {type: number}
        magnesium: {type: number}
        sodium: {type: number}
        sulfate: {type: number}
        chloride: {type: number}
        bicarbonate: {type: number}
        notes: {type: string, maxLength: 500}
    RegisterWaterProfile:
      type: object
      required: [code, name, calcium, magnesium, sodium, sulfate, chloride, bicarbonate]
      properties:
        code: {type: string, maxLength: 40}
        name: {type: string, maxLength: 160}
        calcium: {type: number}
        magnesium: {type: number}
        sodium: {type: number}
        sulfate: {type: number}
        chloride: {type: number}
        bicarbonate: {type: number}
    UpdateWaterProfile:
      type: object
      required: [name, calcium, magnesium, sodium, sulfate, chloride, bicarbonate, version]
      properties:
        name: {type: string, maxLength: 160}
        calcium: {type: number}
        magnesium: {type: number}
        sodium: {type: number}
        sulfate: {type: number}
        chloride: {type: number}
        bicarbonate: {type: number}
        version: {type: integer, format: int64}
    SimulateBlend:
      type: object
      required: [inputs]
      properties:
        inputs:
          type: array
          minItems: 1
          items:
            type: object
            required: [sourceId, volumeLiters]
            properties:
              sourceId: {type: string, format: uuid}
              volumeLiters: {type: number}
        targetProfileId: {type: string, format: uuid}
    Measurement:
      type: object
      required: [parameter, value, unit, measuredAt, source]
      properties:
        parameter: {type: string}
        value: {type: number}
        unit: {type: string}
        measuredAt: {type: string, format: date-time}
        source: {type: string, enum: [MANUAL, SENSOR, IMPORT]}
  responses:
    Problem:
      description: Problem Details
      content:
        application/problem+json:
          schema: {type: object}

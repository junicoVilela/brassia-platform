openapi: 3.1.0
info:
  title: BrassIA Reference Data API
  version: 1.0.0
  description: Contrato de referência para a Sprint 04; adaptar ao código já entregue nas Sprints 00–03.
servers:
  - url: /api/v1
paths:
  /reference/sources:
    get:
      operationId: listReferenceSources
      responses:
        "200":
          description: Fontes visíveis ao usuário
    post:
      operationId: createReferenceSource
      responses:
        "201":
          description: Fonte criada
        "422":
          $ref: "#/components/responses/Problem"
  /reference/datasets:
    get:
      operationId: listReferenceDatasets
      parameters:
        - in: query
          name: sourceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Datasets filtrados
  /reference/import-jobs:
    post:
      operationId: createReferenceImportJob
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [sourceId, file]
              properties:
                sourceId:
                  type: string
                  format: uuid
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Job aceito
        "413":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /reference/import-jobs/{jobId}:
    get:
      operationId: getReferenceImportJob
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Estado e relatório do job
        "404":
          $ref: "#/components/responses/Problem"
  /reference/import-jobs/{jobId}/publish:
    post:
      operationId: publishReferenceImportJob
      parameters:
        - $ref: "#/components/parameters/JobId"
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            maxLength: 100
      responses:
        "201":
          description: Dataset publicado
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
  /reference/styles:
    get:
      operationId: searchStyles
      parameters:
        - in: query
          name: dataset
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Estilos e proveniência
  /reference/ingredients:
    get:
      operationId: searchReferenceIngredients
      parameters:
        - in: query
          name: kind
          schema:
            type: string
            enum: [FERMENTABLE, HOP, CULTURE, MISC, WATER_AGENT]
        - in: query
          name: query
          schema:
            type: string
            maxLength: 100
      responses:
        "200":
          description: Ingredientes publicados
  /recipes/imports:
    post:
      operationId: createRecipeImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [format, file]
              properties:
                format:
                  type: string
                  enum: [BEERJSON_1_0, BEERXML_1_0]
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Importação aceita para prévia
        "422":
          $ref: "#/components/responses/Problem"
  /recipes/imports/{jobId}/confirm:
    post:
      operationId: confirmRecipeImport
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "201":
          description: Receita criada
        "409":
          $ref: "#/components/responses/Problem"
  /recipes/{recipeId}/exports/{format}:
    get:
      operationId: exportRecipe
      parameters:
        - in: path
          name: recipeId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [beerjson, beerxml]
      responses:
        "200":
          description: Arquivo exportado
        "404":
          $ref: "#/components/responses/Problem"
components:
  parameters:
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Problem:
      description: Problem Details RFC 9457
      content:
        application/problem+json:
          schema:
            type: object
            required: [type, title, status]
            properties:
              type:
                type: string
                format: uri-reference
              title:
                type: string
              status:
                type: integer
              detail:
                type: string

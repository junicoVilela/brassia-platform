openapi: 3.1.0
info:
  title: BrassIA Security API
  version: 1.0.0
paths:
  /api/v1/security/users:
    get:
      summary: Lista contas internas (visão administrativa, paginada)
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de usuários}
        '403': {description: Sem permissão security.user.read}
    post:
      summary: Convida um usuário interno (cria conta em estado INVITED)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/InviteUserRequest'}
      responses:
        '201': {description: Usuário convidado (INVITED); token de convite não é retornado}
        '400': {description: Requisição inválida (Problem Details)}
        '403': {description: Sem permissão security.user.invite}
        '409': {description: E-mail já cadastrado}
  /api/v1/security/users/accept-invitation:
    post:
      summary: Aceita o convite (verifica e-mail e ativa a conta)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AcceptInvitationRequest'}
      responses:
        '200': {description: Conta ativada (ACTIVE)}
        '400': {description: Convite inválido, expirado ou já utilizado (mensagem genérica)}
        '409': {description: Conta não está em estado de convite}
  /api/v1/security/users/{userId}/block:
    post:
      summary: Bloqueia uma conta ativa (ACTIVE → LOCKED)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta bloqueada (LOCKED)}
        '403': {description: Sem permissão security.user.block}
        '409': {description: Conta não está ativa}
  /api/v1/security/users/{userId}/unblock:
    post:
      summary: Desbloqueia uma conta bloqueada (LOCKED → ACTIVE)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta reativada (ACTIVE)}
        '403': {description: Sem permissão security.user.block}
        '409': {description: Conta não está bloqueada}
  /api/v1/security/users/{userId}/disable:
    post:
      summary: Desativa a conta e revoga sessões (→ DISABLED)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta desativada (DISABLED)}
        '403': {description: Sem permissão security.user.disable}
        '409': {description: Conta já desativada}
  /api/v1/security/login:
    post:
      summary: Autentica credenciais e cria sessão (cookie __Host-)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200': {description: Sessão criada; retorna identidade (sem cervejaria/permissões até SEC-004/005)}
        '401': {description: Credenciais inválidas sem revelar a causa}
        '429': {description: Limite de tentativas excedido (SEC-012)}
  /api/v1/security/session:
    get:
      summary: Retorna o principal, cervejaria ativa e capabilities
      responses:
        '200': {description: Sessão atual}
        '401': {description: Não autenticado}
  /api/v1/security/logout:
    post:
      summary: Revoga a sessão atual
      responses:
        '204': {description: Sessão revogada}
  /api/v1/security/password/forgot:
    post:
      summary: Solicita recuperação com resposta neutra
      responses:
        '202': {description: Solicitação processada independentemente da existência da conta}
  /api/v1/security/sessions:
    get:
      summary: Lista sessões autorizadas
      responses:
        '200': {description: Sessões sem expor identificadores secretos}
  /api/v1/security/temporary-access:
    post:
      summary: Solicita acesso temporário
      responses:
        '201': {description: Solicitação criada}
        '403': {description: Sem permissão ou segregação violada}
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-brew_session
  schemas:
    InviteUserRequest:
      type: object
      required: [email, displayName]
      properties:
        email: {type: string, format: email, maxLength: 254}
        displayName: {type: string, minLength: 1, maxLength: 160}
    InviteUserResponse:
      type: object
      required: [userId, email, status]
      properties:
        userId: {type: string, format: uuid}
        email: {type: string, format: email}
        status: {type: string, enum: [INVITED]}
    AcceptInvitationRequest:
      type: object
      required: [token, password]
      properties:
        token: {type: string, minLength: 1}
        password: {type: string, minLength: 8, maxLength: 200}
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string, minLength: 1}
    Problem:
      type: object
      required: [type, title, status, code, traceId]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer}
        code: {type: string}
        traceId: {type: string}
security:
  - sessionCookie: []

openapi: 3.1.0
info:
  title: BrassIA Security API
  version: 1.0.0
paths:
  /api/v1/security/permissions:
    get:
      summary: Catálogo de permissões (RBAC)
      responses:
        '200': {description: Lista de permissões}
        '403': {description: Sem permissão security.permission.read}
  /api/v1/security/groups:
    get:
      summary: Lista grupos com suas permissões
      responses:
        '200': {description: Lista de grupos}
        '403': {description: Sem permissão security.group.read}
    post:
      summary: Cria grupo customizado na cervejaria ativa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, permissionCodes]
              properties:
                code: {type: string, maxLength: 80}
                name: {type: string, maxLength: 160}
                description: {type: string, maxLength: 500}
                permissionCodes:
                  type: array
                  items: {type: string}
      responses:
        '201': {description: Grupo criado}
        '403': {description: Sem permissão security.group.manage ou autoelevação}
        '409': {description: Código já existe nesta cervejaria}
  /api/v1/security/groups/{groupId}:
    patch:
      summary: Atualiza grupo customizado (nome, descrição e permissões)
      parameters: [{name: groupId, in: path, required: true, schema: {type: string, format: uuid}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissionCodes, version]
              properties:
                name: {type: string, maxLength: 160}
                description: {type: string, maxLength: 500}
                permissionCodes:
                  type: array
                  items: {type: string}
                version: {type: integer, format: int64}
      responses:
        '200': {description: Grupo atualizado}
        '403': {description: Grupo de sistema, outra cervejaria ou sem permissão}
        '409': {description: Versão divergiu}
  /api/v1/security/users/{userId}/memberships:
    post:
      summary: Associa o usuário a um grupo (na cervejaria ativa do ator)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [groupId]
              properties:
                groupId: {type: string, format: uuid}
      responses:
        '204': {description: Associado}
        '403': {description: Sem permissão security.membership.manage}
        '404': {description: Grupo ou usuário inexistente}
        '409': {description: Associação já existe}
  /api/v1/security/users/{userId}/memberships/{groupId}:
    delete:
      summary: Desassocia o usuário do grupo (na cervejaria ativa do ator)
      parameters:
        - {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: groupId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '204': {description: Desassociado}
        '403': {description: Sem permissão security.membership.manage}
  /api/v1/security/users:
    get:
      summary: Lista contas internas (visão administrativa, paginada)
      parameters:
        - {name: page, in: query, schema: {type: integer, default: 0}}
        - {name: size, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Página de usuários}
        '403': {description: Sem permissão security.user.read}
    post:
      summary: Convida um usuário interno (cria conta em estado INVITED)
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/InviteUserRequest'}
      responses:
        '201': {description: Usuário convidado (INVITED); token de convite não é retornado}
        '400': {description: Requisição inválida (Problem Details)}
        '403': {description: Sem permissão security.user.invite}
        '409': {description: E-mail já cadastrado}
  /api/v1/security/users/accept-invitation:
    post:
      summary: Aceita o convite (verifica e-mail e ativa a conta)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AcceptInvitationRequest'}
      responses:
        '200': {description: Conta ativada (ACTIVE)}
        '400': {description: Convite inválido, expirado ou já utilizado (mensagem genérica)}
        '409': {description: Conta não está em estado de convite}
  /api/v1/security/users/{userId}/block:
    post:
      summary: Bloqueia uma conta ativa (ACTIVE → LOCKED)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta bloqueada (LOCKED)}
        '403': {description: Sem permissão security.user.block}
        '409': {description: Conta não está ativa}
  /api/v1/security/users/{userId}/unblock:
    post:
      summary: Desbloqueia uma conta bloqueada (LOCKED → ACTIVE)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta reativada (ACTIVE)}
        '403': {description: Sem permissão security.user.block}
        '409': {description: Conta não está bloqueada}
  /api/v1/security/users/{userId}/disable:
    post:
      summary: Desativa a conta e revoga sessões (→ DISABLED)
      parameters: [{name: userId, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '200': {description: Conta desativada (DISABLED)}
        '403': {description: Sem permissão security.user.disable}
        '409': {description: Conta já desativada}
  /api/v1/security/login:
    post:
      summary: Autentica credenciais e cria sessão (cookie __Host-)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/LoginRequest'}
      responses:
        '200': {description: Sessão criada; retorna identidade e permissões resolvidas dos grupos (cervejaria ativa é SEC-005)}
        '401': {description: Credenciais inválidas sem revelar a causa}
        '429': {description: Limite de tentativas excedido (SEC-012)}
  /api/v1/security/session:
    get:
      summary: Retorna o principal, cervejaria ativa, acessíveis e permissões
      responses:
        '200': {description: Sessão atual (activeBrewery, accessibleBreweries, permissions)}
        '401': {description: Não autenticado}
  /api/v1/security/session/brewery:
    post:
      summary: Troca a cervejaria ativa da sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [breweryId]
              properties:
                breweryId: {type: string, format: uuid}
      responses:
        '200': {description: Sessão atualizada com a nova cervejaria ativa}
        '401': {description: Não autenticado}
        '403': {description: Cervejaria não acessível}
  /api/v1/security/password/change:
    post:
      summary: Troca a própria senha (verifica a atual, política e histórico)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: {type: string}
                newPassword: {type: string, minLength: 8, maxLength: 200}
      responses:
        '204': {description: Senha alterada}
        '400': {description: Senha atual incorreta, comprometida ou reutilizada}
        '401': {description: Não autenticado}
  /api/v1/security/logout:
    post:
      summary: Revoga a sessão atual
      responses:
        '204': {description: Sessão revogada}
  /api/v1/security/password/forgot:
    post:
      summary: Solicita recuperação com resposta neutra
      responses:
        '202': {description: Solicitação processada independentemente da existência da conta}
  /api/v1/security/sessions:
    get:
      summary: Lista as próprias sessões ativas (id mascarado por ref)
      responses:
        '200': {description: Sessões (ref/createdAt/lastAccessedAt/current), sem expor o id}
        '401': {description: Não autenticado}
    delete:
      summary: Revoga todas as outras sessões (mantém a atual)
      responses:
        '204': {description: Outras sessões encerradas}
        '401': {description: Não autenticado}
  /api/v1/security/sessions/{ref}:
    delete:
      summary: Revoga a própria sessão indicada pela ref
      parameters: [{name: ref, in: path, required: true, schema: {type: string}}]
      responses:
        '204': {description: Sessão encerrada}
        '401': {description: Não autenticado}
  /api/v1/security/login-events:
    get:
      summary: Histórico de login do próprio usuário (IP/UA mascarados)
      responses:
        '200': {description: Eventos de login (occurredAt/outcome/reasonCode)}
        '401': {description: Não autenticado}
  /api/v1/security/audit-events:
    get:
      summary: Auditoria de segurança da cervejaria ativa (append-only, diff mascarado)
      responses:
        '200': {description: Eventos (occurredAt/action/outcome/target/actor/changeSummary)}
        '403': {description: Sem permissão security.audit.read}
  /api/v1/security/temporary-access:
    get:
      summary: Lista concessões temporárias da cervejaria ativa (visão administrativa)
      responses:
        '200': {description: Concessões (id/userId/permissionCode/critical/reason/janela/status)}
        '403': {description: Sem permissão security.temporary-access.read}
    post:
      summary: Solicita acesso temporário (permissão pontual, com vigência)
      description: >
        Escopo é a cervejaria ativa do ator. Permissão comum vige na janela ao ser
        solicitada; permissão crítica fica pendente até aprovação de um segundo usuário.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, permissionCode, reason, durationHours]
              properties:
                userId: {type: string, format: uuid}
                permissionCode: {type: string, maxLength: 120}
                reason: {type: string, minLength: 1, maxLength: 500}
                durationHours: {type: integer, minimum: 1, maximum: 720}
      responses:
        '201': {description: 'Concessão criada; corpo {id}'}
        '400': {description: Permissão/usuário inexistente ou requisição inválida (Problem Details)}
        '403': {description: Sem permissão security.temporary-access.request}
  /api/v1/security/temporary-access/{id}/approve:
    post:
      summary: Aprova uma concessão pendente (aprovador ≠ solicitante)
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '204': {description: Concessão aprovada}
        '403': {description: Sem permissão security.temporary-access.approve ou segregação violada}
        '409': {description: Concessão não está pendente (revogada/expirada/já aprovada)}
  /api/v1/security/temporary-access/{id}:
    delete:
      summary: Revoga uma concessão temporária
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: uuid}}]
      responses:
        '204': {description: Concessão revogada}
        '403': {description: Sem permissão security.temporary-access.revoke}
        '409': {description: Concessão já revogada}
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-brew_session
  schemas:
    InviteUserRequest:
      type: object
      required: [email, displayName]
      properties:
        email: {type: string, format: email, maxLength: 254}
        displayName: {type: string, minLength: 1, maxLength: 160}
    InviteUserResponse:
      type: object
      required: [userId, email, status]
      properties:
        userId: {type: string, format: uuid}
        email: {type: string, format: email}
        status: {type: string, enum: [INVITED]}
    AcceptInvitationRequest:
      type: object
      required: [token, password]
      properties:
        token: {type: string, minLength: 1}
        password: {type: string, minLength: 8, maxLength: 200}
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string, minLength: 1}
    Problem:
      type: object
      required: [type, title, status, code, traceId]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer}
        code: {type: string}
        traceId: {type: string}
security:
  - sessionCookie: []
